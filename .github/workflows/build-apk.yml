name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_FIREBASE_GOOGLE_WEB_CLIENT_ID }}
      VITE_PUBLIC_APP_URL: ${{ secrets.VITE_PUBLIC_APP_URL }}
      VITE_SOCKET_SERVER_URL: ${{ secrets.VITE_SOCKET_SERVER_URL }}
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Validate required Vite env vars
        run: |
          required_vars=(
            VITE_FIREBASE_API_KEY
            VITE_FIREBASE_AUTH_DOMAIN
            VITE_FIREBASE_PROJECT_ID
            VITE_FIREBASE_STORAGE_BUCKET
            VITE_FIREBASE_MESSAGING_SENDER_ID
            VITE_FIREBASE_APP_ID
            VITE_FIREBASE_GOOGLE_WEB_CLIENT_ID
            VITE_SOCKET_SERVER_URL
            GOOGLE_SERVICES_JSON
          )
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required GitHub secret: $var_name"
              exit 1
            fi
          done
          if [ -z "${VITE_PUBLIC_APP_URL}" ]; then
            echo "Warning: VITE_PUBLIC_APP_URL is not set. Share links may use fallback origin."
          fi

      - name: Build web assets
        run: npm run build

      - name: Verify web build output
        run: |
          ls -la dist
          test -f dist/index.html

      - name: Ensure Android platform exists
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Write google-services.json
        run: |
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          test -s android/app/google-services.json
          echo "[workflow] Wrote google-services.json"

      - name: Prepare Android Google auth resource
        run: node scripts/prepare-android-google-auth.cjs

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug -PrgcfaIncludeGoogle=true

      - name: Print APK signing certificate fingerprints
        run: |
          keytool -printcert -jarfile android/app/build/outputs/apk/debug/app-debug.apk | sed -n '/Owner:/p;/Issuer:/p;/SHA1:/p;/SHA-256:/p'

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tripcash-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
